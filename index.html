<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Analyser Pro</title>
    <style>
        :root { --bg: #0b0e11; --card: #151921; --accent: #00ff88; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .navbar { background: var(--card); padding: 15px; border-bottom: 1px solid #2a2e35; font-weight: bold; color: var(--accent); margin-bottom: 20px; }
        .market-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #2a2e35; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
        .digit-item { background: #1c2128; padding: 8px 0; border-radius: 6px; border: 1px solid #333; position: relative; overflow: hidden; }
        .digit-bar { position: absolute; bottom: 0; width: 100%; background: rgba(0, 191, 255, 0.2); transition: height 0.3s; }
        .digit-val { font-size: 0.8rem; font-weight: bold; position: relative; z-index: 2; }
        .active { border-color: var(--accent); background: #222; }
    </style>
</head>
<body>
    <div class="navbar">PRO ANALYSER GLOBAL</div>
    <div id="dashboard"></div>

    <script>
        // --- THIS IS THE LINE ---
        const TOKEN = 'CT0nArlbvM9ycRt'; 
        
        const markets = [
            { id: "R_10", name: "Vol 10" }, { id: "1HZ10V", name: "Vol 10 (1s)" },
            { id: "R_100", name: "Vol 100" }, { id: "1HZ100V", name: "Vol 100 (1s)" }
        ];

        const stats = {};
        const dashboard = document.getElementById('dashboard');

        markets.forEach(m => {
            stats[m.id] = { history: [] };
            dashboard.innerHTML += `
                <div class="market-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span style="color:#00bfff; font-weight:bold;">${m.name}</span>
                        <span id="price-${m.id}" style="font-family:monospace; color:#888;">0.00</span>
                    </div>
                    <div class="grid" id="digits-${m.id}"></div>
                </div>`;
            
            let digitDiv = document.getElementById(`digits-${m.id}`);
            for(let i=0; i<=9; i++) {
                digitDiv.innerHTML += `
                    <div class="digit-item" id="item-${m.id}-${i}">
                        <div class="digit-bar" id="bar-${m.id}-${i}" style="height:0%"></div>
                        <div class="digit-val" id="pct-${m.id}-${i}">0%</div>
                        <div style="font-size:10px; color:#555;">${i}</div>
                    </div>`;
            }
        });

        let ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
        ws.onopen = () => ws.send(JSON.stringify({ authorize: TOKEN }));
        ws.onmessage = (msg) => {
            let data = JSON.parse(msg.data);
            if (data.msg_type === 'authorize') {
                markets.forEach(m => ws.send(JSON.stringify({ ticks: m.id, subscribe: 1 })));
            }
            if (data.msg_type === 'tick') {
                let mID = data.tick.symbol;
                let lastDigit = parseInt(data.tick.quote.toFixed(2).slice(-1));
                document.getElementById(`price-${mID}`).innerText = data.tick.quote.toFixed(2);
                stats[mID].history.push(lastDigit);
                if(stats[mID].history.length > 100) stats[mID].history.shift();
                
                let h = stats[mID].history;
                let counts = new Array(10).fill(0);
                h.forEach(d => counts[d]++);

                for(let i=0; i<=9; i++) {
                    let p = ((counts[i] / h.length) * 100).toFixed(0);
                    document.getElementById(`pct-${mID}-${i}`).innerText = p + '%';
                    document.getElementById(`bar-${mID}-${i}`).style.height = (p * 3) + '%';
                    let item = document.getElementById(`item-${mID}-${i}`);
                    item.className = 'digit-item' + (i === lastDigit ? ' active' : '');
                }
            }
        };
    </script>
</body>
</html>
