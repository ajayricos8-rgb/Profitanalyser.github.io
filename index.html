<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Digit Analyzer</title>
    <style>
        :root {
            --bg: #06080a;
            --card: #111418;
            --accent: #00ff88;
            --secondary: #00bfff;
            --danger: #ff4d4d;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding-bottom: 30px;
        }

        /* --- Navigation Bar --- */
        .navbar {
            background: var(--card);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .logo { font-weight: bold; color: var(--accent); font-size: 1.2rem; }

        /* --- Main Layout --- */
        .container { padding: 15px; max-width: 500px; margin: auto; }

        .market-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #222;
        }

        select {
            width: 100%;
            padding: 10px;
            background: #1a1e23;
            color: white;
            border: 1px solid #333;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        #price { font-size: 2rem; font-family: monospace; color: var(--secondary); margin: 10px 0; }

        /* --- Summary Widgets (Even/Odd & Over/Under) --- */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .summary-box {
            background: var(--card);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #222;
        }

        .summary-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .summary-val { font-size: 1.1rem; font-weight: bold; margin-top: 5px; }

        /* --- Digit Stats Table --- */
        .digit-table {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .digit-row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #1e2227;
            position: relative;
        }

        .digit-num { width: 30px; font-weight: bold; z-index: 2; }
        .progress-container { flex-grow: 1; height: 8px; background: #222; border-radius: 4px; margin: 0 15px; overflow: hidden; z-index: 2;}
        .progress-bar { height: 100%; background: var(--secondary); width: 0%; transition: width 0.3s; }
        .digit-pct { width: 50px; text-align: right; font-family: monospace; z-index: 2; }

        /* Highlights */
        .hot { color: var(--accent); }
        .cold { color: var(--danger); }
        .active-row { background: rgba(0, 255, 136, 0.05); border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">MWASHUMBE PRO</div>
        <div style="font-size: 0.8rem; color: #888;">Live Analysis</div>
    </div>

    <div class="container">
        <div class="market-card">
            <select id="marketSelect" onchange="switchMarket()">
                <option value="R_100">Volatility 100 Index</option>
                <option value="R_10">Volatility 10 Index</option>
                <option value="1HZ10V">Volatility 10 (1s)</option>
                <option value="1HZ100V">Volatility 100 (1s)</option>
            </select>
            <div id="price">0.00</div>
        </div>

        <div class="summary-grid">
            <div class="summary-box">
                <div class="summary-label">Even / Odd</div>
                <div class="summary-val"><span id="evenPct">0</span>% / <span id="oddPct">0</span>%</div>
            </div>
            <div class="summary-box">
                <div class="summary-label">Under / Over (4)</div>
                <div class="summary-val"><span id="underPct">0</span>% / <span id="overPct">0</span>%</div>
            </div>
        </div>

        <div class="digit-table" id="statTable">
            </div>
    </div>

    <script>
        const TOKEN = 'CT0nArlbvM9ycRt'; // Your API Token
        let currentMarket = "R_100";
        let history = [];
        let ws;

        // Init Table
        const table = document.getElementById('statTable');
        for(let i=0; i<=9; i++) {
            table.innerHTML += `
                <div class="digit-row" id="row${i}">
                    <div class="digit-num">${i}</div>
                    <div class="progress-container"><div class="progress-bar" id="bar${i}"></div></div>
                    <div class="digit-pct" id="pct${i}">0%</div>
                </div>`;
        }

        function connect() {
            if(ws) ws.close();
            ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
            ws.onopen = () => ws.send(JSON.stringify({authorize: TOKEN}));
            ws.onmessage = (msg) => {
                let data = JSON.parse(msg.data);
                if(data.msg_type === 'authorize') ws.send(JSON.stringify({ticks: currentMarket, subscribe: 1}));
                if(data.msg_type === 'tick') {
                    let price = data.tick.quote.toFixed(2);
                    let lastDigit = parseInt(price.slice(-1));
                    document.getElementById('price').innerText = price;
                    
                    history.push(lastDigit);
                    if(history.length > 100) history.shift();
                    updateUI(lastDigit);
                }
            };
        }

        function updateUI(current) {
            let counts = new Array(10).fill(0);
            let even = 0, under = 0;

            history.forEach(d => {
                counts[d]++;
                if(d % 2 === 0) even++;
                if(d <= 4) under++;
            });

            // Update Summary
            let total = history.length;
            document.getElementById('evenPct').innerText = ((even/total)*100).toFixed(0);
            document.getElementById('oddPct').innerText = (100 - (even/total)*100).toFixed(0);
            document.getElementById('underPct').innerText = ((under/total)*100).toFixed(0);
            document.getElementById('overPct').innerText = (100 - (under/total)*100).toFixed(0);

            // Update List
            for(let i=0; i<=9; i++) {
                let p = ((counts[i]/total)*100).toFixed(1);
                document.getElementById('pct'+i).innerText = p + '%';
                document.getElementById('bar'+i).style.width = p + '%';
                
                let row = document.getElementById('row'+i);
                row.className = 'digit-row' + (i === current ? ' active-row' : '');
                
                let pctEl = document.getElementById('pct'+i);
                pctEl.className = 'digit-pct ' + (p > 12 ? ' hot' : (p < 8 ? ' cold' : ''));
            }
        }

        function switchMarket() {
            currentMarket = document.getElementById('marketSelect').value;
            history = [];
            connect();
        }

        connect();
    </script>
</body>
</html>
