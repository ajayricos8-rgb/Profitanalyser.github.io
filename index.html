<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Analyser Pro | Global Dashboard</title>
    <style>
        :root {
            --bg: #0b0e11;
            --card: #151921;
            --accent: #00ff88;
            --secondary: #00bfff;
            --danger: #ff4d4d;
            --text: #ffffff;
            --border: #2a2e35;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        /* Navigation */
        .navbar {
            background: var(--card);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 800; color: var(--accent); font-size: 1.2rem; letter-spacing: 1px; }
        .status { font-size: 0.7rem; color: #888; display: flex; align-items: center; }
        .dot { height: 8px; width: 8px; background: var(--accent); border-radius: 50%; margin-right: 5px; animation: blink 1.5s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .container { padding: 15px; max-width: 800px; margin: auto; }

        /* Market Card */
        .market-card {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .m-header {
            background: rgba(255,255,255,0.03);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .m-title { font-weight: bold; color: var(--secondary); font-size: 0.95rem; }
        .m-price { font-family: 'Courier New', monospace; font-weight: bold; color: #aaa; }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
        }

        .stat-box {
            background: #1c2128;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #333;
        }

        .stat-label { font-size: 0.65rem; color: #777; text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 0.9rem; font-weight: bold; color: var(--text); }

        /* Digit Grid */
        .digit-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 15px;
        }

        .digit-item {
            background: #1c2128;
            padding: 10px 5px;
            border-radius: 8px;
            text-align: center;
            position: relative;
            border: 1px solid var(--border);
            transition: 0.2s;
        }

        .digit-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 191, 255, 0.15);
            transition: height 0.4s ease;
            z-index: 1;
        }

        .digit-num { font-size: 0.65rem; color: #555; position: relative; z-index: 2; }
        .digit-pct { font-size: 0.85rem; font-weight: 700; position: relative; z-index: 2; font-family: monospace; }

        /* Highlighting */
        .active-digit { border-color: var(--accent); background: #222; transform: translateY(-2px); }
        .hot { color: var(--accent); }
        .cold { color: var(--danger); }

    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">PRO ANALYSER</div>
        <div class="status"><span class="dot"></span> LIVE DATA</div>
    </div>

    <div class="container" id="main-dashboard">
        </div>

    <script>
        const TOKEN = 'CT0nArlbvM9ycRt'; 
        const markets = [
            { id: "R_10", name: "Volatility 10" },
            { id: "1HZ10V", name: "Volatility 10 (1s)" },
            { id: "R_25", name: "Volatility 25" },
            { id: "1HZ25V", name: "Volatility 25 (1s)" },
            { id: "R_50", name: "Volatility 50" },
            { id: "1HZ50V", name: "Volatility 50 (1s)" },
            { id: "R_100", name: "Volatility 100" },
            { id: "1HZ100V", name: "Volatility 100 (1s)" }
        ];

        const stats = {};
        const dashboard = document.getElementById('main-dashboard');

        // Build UI
        markets.forEach(m => {
            stats[m.id] = { history: [] };
            
            let cardHTML = `
                <div class="market-card">
                    <div class="m-header">
                        <span class="m-title">${m.name}</span>
                        <span class="m-price" id="price-${m.id}">0.00</span>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-label">Even / Odd</div>
                            <div class="stat-val" id="eo-${m.id}">0% / 0%</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Under / Over (4)</div>
                            <div class="stat-val" id="uo-${m.id}">0% / 0%</div>
                        </div>
                    </div>
                    <div class="digit-container" id="digits-${m.id}"></div>
                </div>`;
            
            dashboard.innerHTML += cardHTML;
            let digitDiv = document.getElementById(`digits-${m.id}`);
            for(let i=0; i<=9; i++) {
                digitDiv.innerHTML += `
                    <div class="digit-item" id="item-${m.id}-${i}">
                        <div class="digit-bar" id="bar-${m.id}-${i}" style="height: 0%"></div>
                        <div class="digit-num">${i}</div>
                        <div class="digit-pct" id="pct-${m.id}-${i}">0%</div>
                    </div>`;
            }
        });

        let ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');

        ws.onopen = () => ws.send(JSON.stringify({ authorize: TOKEN }));

        ws.onmessage = (msg) => {
            let data = JSON.parse(msg.data);
            if (data.msg_type === 'authorize') {
                markets.forEach(m => ws.send(JSON.stringify({ ticks: m.id, subscribe: 1 })));
            }
            if (data.msg_type === 'tick') {
                let mID = data.tick.symbol;
                let price = data.tick.quote.toFixed(2);
                let lastDigit = parseInt(price.slice(-1));

                document.getElementById(`price-${mID}`).innerText = price;
                
                let h = stats[mID].history;
                h.push(lastDigit);
                if(h.length > 100) h.shift();

                updateUI(mID, lastDigit);
            }
        };

        function updateUI(mID, current) {
            let h = stats[mID].history;
            let counts = new Array(10).fill(0);
            let even = 0, under = 0;

            h.forEach(d => {
                counts[d]++;
                if(d % 2 === 0) even++;
                if(d <= 4) under++;
            });

            let total = h.length;

            // Update Summary Stats
            document.getElementById(`eo-${mID}`).innerText = `${((even/total)*100).toFixed(0)}% / ${(100 - (even/total)*100).toFixed(0)}%`;
            document.getElementById(`uo-${mID}`).innerText = `${((under/total)*100).toFixed(0)}% / ${(100 - (under/total)*100).toFixed(0)}%`;

            // Update Digits
            for(let i=0; i<=9; i++) {
                let p = ((counts[i] / total) * 100).toFixed(0);
                let pctText = document.getElementById(`pct-${mID}-${i}`);
                let bar = document.getElementById(`bar-${mID}-${i}`);
                let item = document.getElementById(`item-${mID}-${i}`);

                pctText.innerText = p + '%';
                bar.style.height = (p * 3) + '%'; // Scale for visibility

                // Hot/Cold Logic
                pctText.className = 'digit-pct' + (p > 13 ? ' hot' : (p < 7 ? ' cold' : ''));
                
                // Active Highlight
                item.classList.remove('active-digit');
                if(i === current) item.classList.add('active-digit');
            }
        }
    </script>
</body>
</html>
